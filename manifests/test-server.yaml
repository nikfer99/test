apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: test-server
  template:
    metadata:
      labels:
        app: test-server
    spec:
      containers:
      - name: server
        image: hashicorp/http-echo
        args:
        - "-text=Hello from test server"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: test-server-service
spec:
  type: NodePort
  selector:
    app: test-server
  ports:
    - port: 8080
      targetPort: 5678
